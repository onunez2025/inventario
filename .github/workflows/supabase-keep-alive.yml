name: Supabase Keep Alive

on:
  schedule:
    # Corre cada 3 días a las 00:00 UTC para asegurar que no se pause por inactividad (límite de 7 días)
    - cron: '0 0 */3 * *'
  workflow_dispatch: # Esto te permite ejecutarlo manualmente desde la pestaña "Actions" de GitHub

jobs:
  ping_supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase API
        run: |
          curl -i -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/articulos?select=id&limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
